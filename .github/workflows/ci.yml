name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module
        run: go mod tidy && git diff --exit-code

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/hyprmoncfg ./cmd/hyprmoncfgd

      - name: Validate PKGBUILD syntax
        run: |
          bash -n packaging/arch/hyprmoncfg/PKGBUILD
          bash -n packaging/arch/hyprmoncfg-git/PKGBUILD
