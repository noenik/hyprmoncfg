name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-docs-version:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: goreleaser
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update docs version selector
        run: |
          version="${RELEASE_VERSION#v}"
          sed -i "s/^current:.*/current: \"${version}\"/" docs/_data/versions.yml

      - name: Commit docs version update
        run: |
          version="${RELEASE_VERSION#v}"
          if git diff --quiet -- docs/_data/versions.yml; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/_data/versions.yml
          git commit -m "docs: update version selector to ${version}"
          git push origin HEAD:main

      - name: Trigger docs workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml --ref main
